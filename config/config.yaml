# ── Polymarket Weather Bot — Configuration ───────────────────────────────────
# Values here can be overridden by environment variables (ENV wins over yaml).
# Secrets (private key, API keys) are best kept in .env or real ENV — not here.
# ─────────────────────────────────────────────────────────────────────────────

# Cities to trade (must match keys in internal/weather/weather.go or city_defs below).
# Env override: CITIES=new_york,london,tokyo (comma-separated)
cities:
  - new_york
  - london
  - tokyo
  - miami
  - paris
  - chicago
  - los_angeles
  - san_francisco
  - berlin
  - dubai
  - sydney
  - singapore
  - toronto
  - moscow

# Optional custom city definitions with explicit lat/lon.
# Use this to add new cities without modifying weather.go.
# If a name matches a built-in city, this overrides its coordinates.
city_defs:
  - name: dubai
    lat: 25.20
    lon: 55.27
  - name: sydney
    lat: -33.87
    lon: 151.21
  - name: singapore
    lat: 1.35
    lon: 103.82
  - name: toronto
    lat: 43.65
    lon: -79.38
  - name: moscow
    lat: 55.75
    lon: 37.62

# Minimum edge required to place a bet (5% default).
# Env override: MIN_EDGE=0.05
min_edge: 0.05

# Maximum bet per market in USDC.
# Env override: MAX_BET_USDC=10.0
max_bet: 10.0

# Loop interval in seconds (0 = run once and exit).
# Env override: LOOP_SEC=3600
loop_sec: 0

# Prometheus /metrics port (0 = disabled).
# Env override: METRICS_PORT=9090
metrics_port: 9090

# Log level: debug | info | warn | error
# Env override: LOG_LEVEL=info
log_level: info

# Root directory for data/ files (bets_history.csv, historical/, satellite/).
# Env override: DATA_ROOT=.
data_root: "."

# ── Risk management ──────────────────────────────────────────────────────────
# Stop betting for the rest of the UTC calendar day when today's realised P&L
# falls below -max_daily_loss_usdc (0 = disabled).
# Env override: MAX_DAILY_LOSS_USDC=50
max_daily_loss_usdc: 50.0

# Daily profit target: stop betting when today's realised P&L exceeds this
# value — locks in gains and prevents overtrading after a lucky run (0 = disabled).
# Env override: MAX_DAILY_PROFIT_USDC=100
max_daily_profit_usdc: 0.0

# Maximum number of bets per UTC calendar day (0 = unlimited).
# Env override: MAX_DAILY_BETS=20
max_daily_bets: 20

# Maximum number of simultaneously open (unresolved) positions (0 = unlimited).
# Env override: MAX_OPEN_POSITIONS=30
max_open_positions: 30

# Maximum number of simultaneously open bets on the same (city, signal) pair (0 = unlimited).
# Prevents over-concentration, e.g. holding 3 open new_york/rain bets at once.
# Env override: MAX_SAME_CITY_SIGNAL_BETS=2
max_same_city_signal_bets: 2

# Hard cap on total USDC at risk across all open (unresolved) positions.
# Prevents over-leveraging the bankroll regardless of individual bet sizes.
# 0 = disabled. Env override: MAX_EXPOSURE_USDC
max_exposure_usdc: 0.0

# ── Forecast quality ─────────────────────────────────────────────────────────
# Skip bets on forecasts older than this many hours (0 = disabled).
# Env override: MAX_FORECAST_AGE_HOURS=3
max_forecast_age_hours: 3.0

# Maximum bets to place per single bot cycle (0 = unlimited).
# Env override: MAX_BETS_PER_CYCLE=5
max_bets_per_cycle: 5

# Skip markets closing within this many hours — near-expiry spreads are wide
# and liquidity is thin. Set 0 to disable. (TASK-037)
# Env override: MIN_HOURS_TO_EXPIRY=6
min_hours_to_expiry: 6.0

# ── Kelly bet sizing (TASK-080) ───────────────────────────────────────────────
# Fraction of the full Kelly criterion to apply (0.25=quarter, 0.5=half, 1.0=full).
# Half-Kelly (0.5) is the industry default: ~75% of full-Kelly EV with ~50% less variance.
# Env override: KELLY_FRACTION=0.5
kelly_fraction: 0.5

# Hard cap on fraction of bankroll risked per single bet (5% default).
# Kelly can recommend large bets on high-edge markets; this limits single-bet exposure.
# Env override: MAX_KELLY_FRACTION=0.05
max_kelly_fraction: 0.05

# Polymarket protocol fee on winning bets (2% of net profit, as of 2024).
# Kelly sizing uses fee-adjusted odds so positions account for the real payout.
# Set to 0 to disable fee adjustment (e.g. for back-testing on pre-fee data).
# Env override: PROTOCOL_FEE_RATE=0.02
protocol_fee_rate: 0.02

# ── Anti-detection / rate limiting ───────────────────────────────────────────
# Sleep a random 30s–3min before each live bet to avoid mechanical timing patterns.
# Env override: BET_JITTER_ENABLED=true
bet_jitter_enabled: true

# Minimum hours between bets on the same conditionID (market cooldown).
# Prevents re-betting the same market too frequently. 0 = disabled.
# Env override: MIN_BET_INTERVAL_HOURS=4
min_bet_interval_hours: 4.0

# ── Polymarket CLOB credentials ───────────────────────────────────────────────
# These are sensitive — prefer ENV variables or .env file over this yaml.
# Env overrides: POLYMARKET_PRIVATE_KEY, POLYMARKET_ADDRESS, POLYMARKET_API_KEY,
#                POLYMARKET_API_SECRET, POLYMARKET_API_PASSPHRASE
poly_private_key: ""
poly_address: ""
poly_api_key: ""
poly_api_secret: ""
poly_api_passphrase: ""

# ── Telegram notifications ────────────────────────────────────────────────────
# Create a bot via @BotFather; get your chat ID via @userinfobot.
# Env overrides: TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
telegram_bot_token: ""
telegram_chat_id: ""

# ── Per-signal minimum edge overrides (TASK-118) ─────────────────────────────
# Override min_edge on a per-signal basis. Signals not listed here use the
# global min_edge. Set tighter for high-predictability signals (heat) and
# wider for harder-to-predict ones (snow).
# signal_min_edge:
#   rain: 0.06
#   heat: 0.04
#   snow: 0.08
#   wind: 0.07
#   sunny: 0.05
signal_min_edge: {}

# ── Auto-blacklist (TASK-131) ─────────────────────────────────────────────────
# Automatically suppress a (city, signal) pair that shows systematic losses.
# Checked after every cycle; once triggered the pair is skipped for N days.
# auto_blacklist_min_bets: minimum resolved bets before check activates (default 8)
# auto_blacklist_loss_usdc: cumulative P&L threshold (negative; default -3.0)
# auto_blacklist_days: days to suppress the pair (default 3)
auto_blacklist_min_bets: 8
auto_blacklist_loss_usdc: -3.0
auto_blacklist_days: 3

# ── Rolling win-rate alert (TASK-132) ─────────────────────────────────────────
# Telegram warning when the rolling win rate over the last N resolved bets falls
# below the threshold. Set rolling_winrate_window to 0 to disable.
rolling_winrate_window: 20
rolling_winrate_threshold: 0.35

# ── Webhook notifications (TASK-046) ─────────────────────────────────────────
# POST JSON to this URL on bet_placed / bet_skipped_risk / cycle_complete / error.
# Leave empty to disable. Env override: WEBHOOK_URL
webhook_url: ""

# ── Market volume filter (TASK-175) ──────────────────────────────────────────
# Skip markets with total traded volume below this threshold (in USDC).
# Markets with very low volume ($10) are illiquid toys — spreads are huge and
# even small orders move the price. Set to 0 to disable.
# Env override: MIN_VOLUME_USDC
min_volume_usdc: 500.0

# TASK-177: per-source HTTP timeout overrides in seconds.
# These are the maximum times to wait for each weather data source.
# Sources that exceed their individual timeout are dropped gracefully.
# All timeouts are also bounded by the global 8-second fetch deadline.
source_timeouts:
  openmeteo: 8
  nasa: 10
  noaa: 8
  goes: 15
  hrrr: 8
  ensemble: 10
  ecmwf: 12
  gfs: 10
